litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 2
  request_timeout: 120
  telemetry: false
  success_callback:
  - postgres
  failure_callback:
  - postgres
  callbacks:
  - langfuse_otel
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 60
  cooldown_time: 60
  allowed_fails: 2
  retry_after: 5
  fallbacks:
  - inbox-zero-main:
    - inbox-zero-main-fallback
    - inbox-zero-economy
  - inbox-zero-chat:
    - inbox-zero-main
    - inbox-zero-economy
  - inbox-zero-draft:
    - inbox-zero-economy
    - inbox-zero-main-fallback
  - inbox-zero-nano:
    - inbox-zero-economy
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  disable_spend_logs: false
  ui_username: os.environ/UI_USERNAME
  ui_password: os.environ/UI_PASSWORD
