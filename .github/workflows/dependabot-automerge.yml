name: Dependabot auto-merge

# Auto-merge dependabot PRs once CI is green.
# Patch and minor bumps merge automatically. Major bumps stay open with
# a `needs-review` label so a human can eyeball breaking changes.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    name: Auto-merge dependabot PR
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Get update metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major upgrades for review (skip auto-merge)
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['needs-review', 'major-upgrade'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '🚧 Major version bump — held back from auto-merge. Please review the changelog before merging.',
            });

      - name: Enable auto-merge for patch & minor
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --squash --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
