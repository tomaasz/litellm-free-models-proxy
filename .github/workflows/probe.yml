name: Probe model availability

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  probe:
    runs-on: ubuntu-latest
    concurrency:
      group: probe-models
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run probes
        env:
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:      ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:     ${{ secrets.SAMBANOVA_API_KEY }}
          COHERE_API_KEY:        ${{ secrets.COHERE_API_KEY }}
          TOGETHER_API_KEY:      ${{ secrets.TOGETHER_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_NIM_API_KEY:    ${{ secrets.NVIDIA_NIM_API_KEY }}
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          MISTRAL_API_KEY:       ${{ secrets.MISTRAL_API_KEY }}
          GH_MODELS_TOKEN:       ${{ secrets.GH_MODELS_TOKEN }}
          CLOUDFLARE_API_KEY:    ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python probe_models.py

      - name: Commit probe results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage paths only if they exist — `git add` aborts entirely if any
          # pathspec is missing, leaving everything unstaged.
          for p in docs/probes.jsonl docs/availability.json docs/probes-archive; do
            [ -e "$p" ] && git add "$p"
          done
          git diff --cached --quiet || git commit -m "chore: probe results $(date -u '+%Y-%m-%d %H:%M')"
          # Rebase-and-retry in case update-models.yml committed concurrently.
          for i in 1 2 3 4; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
            sleep $((2 ** i))
          done
